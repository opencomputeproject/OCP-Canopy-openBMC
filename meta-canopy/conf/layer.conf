# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "canopy-layer"
BBFILE_PATTERN_canopy-layer = "^${LAYERDIR}/"
BBFILE_PRIORITY_canopy-layer = "10"
LAYERSERIES_COMPAT_canopy-layer = "walnascar"
