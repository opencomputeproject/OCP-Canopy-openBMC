# Canopy QEMU machine
#
# Emulates an AST2600 EVB to test Canopy customizations (WebUI branding,
# etc.) without physical hardware.  The HPE GXP layers are intentionally
# excluded — only the top-level canopy-layer is active.

KERNEL_DEVICETREE = "aspeed/aspeed-ast2600-evb.dtb"

UBOOT_MACHINE = "ast2600_openbmc_spl_defconfig"
UBOOT_DEVICETREE = "ast2600-evb"
SPL_BINARY = "spl/u-boot-spl.bin"
SOCSEC_SIGN_ENABLE = "0"

require conf/machine/include/ast2600.inc
require conf/machine/include/obmc-bsp-common.inc
include conf/machine/include/obmc-evb-common.inc

SERIAL_CONSOLES = "115200;ttyS4"

# AST2600 EVB default: 64 MB SPI flash
FLASH_SIZE = "65536"

# Use the Aspeed kernel, not the Canopy GXP kernel
PREFERRED_PROVIDER_virtual/kernel = "linux-aspeed"
