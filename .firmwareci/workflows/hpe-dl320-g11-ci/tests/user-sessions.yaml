name: "User: Session Management"
description: >-
  Verify Redfish session creation, token-based authentication, and
  session deletion. Creates a session, uses the token for API calls,
  deletes the session, and verifies the token is invalidated.
  BMC-only, no host power required.

defaults:
  transport: &bmc_ssh
    proto: ssh
    options:
      host: "[[attributes.BMC]]"
      user: "root"
      password: "[[attributes.BMCPassword]]"

stages:
  - name: Wait for BMC
    steps:
      - cmd: ping
        name: Wait for SSH
        options:
          timeout: 5m
        parameters:
          host: "[[attributes.BMC]]"
      - cmd: cmd
        name: Wait for services to settle
        transport: *bmc_ssh
        options:
          timeout: 2m
        parameters:
          executable: sleep
          args: ["45"]

  - name: Session Lifecycle
    steps:
      - cmd: cmd
        name: Create session, use token, verify, delete, confirm invalidation
        transport: &local
          proto: local
        options:
          timeout: 60s
        parameters:
          executable: sh
          args:
            - "-c"
            - |
              set -e
              BMC="[[attributes.BMC]]"
              PASS="[[attributes.BMCPassword]]"

              echo "=== Step 1: Create session ==="
              RESP=$(curl -sk -u root:${PASS} -X POST -H 'Content-Type: application/json' -d '{"UserName":"root","Password":"'"${PASS}"'"}' -D /tmp/sess_headers https://${BMC}/redfish/v1/SessionService/Sessions)
              HTTP=$(curl -sk -u root:${PASS} -X POST -H 'Content-Type: application/json' -d '{"UserName":"root","Password":"'"${PASS}"'"}' https://${BMC}/redfish/v1/SessionService/Sessions -o /dev/null -w '%{http_code}')
              echo "Create session HTTP=$HTTP"

              TOKEN=$(grep -i 'X-Auth-Token' /tmp/sess_headers | tr -d '\r' | awk '{print $2}')
              LOCATION=$(grep -i 'Location' /tmp/sess_headers | tr -d '\r' | awk '{print $2}')
              echo "Token=$(echo "$TOKEN" | cut -c1-8)..."
              echo "Location=$LOCATION"
              test -n "$TOKEN" || { echo "FAIL: No token received"; exit 1; }
              test -n "$LOCATION" || { echo "FAIL: No location received"; exit 1; }

              echo "=== Step 2: Use token for GET Systems ==="
              HTTP2=$(curl -sk -H "X-Auth-Token: $TOKEN" https://${BMC}/redfish/v1/Systems/system -o /dev/null -w '%{http_code}')
              echo "Token auth Systems HTTP=$HTTP2"
              test "$HTTP2" = "200" || { echo "FAIL: Token auth failed"; exit 1; }

              echo "=== Step 3: Use token for GET Chassis ==="
              HTTP3=$(curl -sk -H "X-Auth-Token: $TOKEN" https://${BMC}/redfish/v1/Chassis/chassis -o /dev/null -w '%{http_code}')
              echo "Token auth Chassis HTTP=$HTTP3"
              test "$HTTP3" = "200" || { echo "FAIL: Token auth Chassis failed"; exit 1; }

              echo "=== Step 4: Get session details ==="
              SESS_PATH=$(echo "$LOCATION" | sed 's|.*\(/redfish/v1/SessionService/Sessions/[^ ]*\)|\1|')
              HTTP4=$(curl -sk -u root:${PASS} https://${BMC}${SESS_PATH} -o /tmp/sess_detail -w '%{http_code}')
              echo "Session detail HTTP=$HTTP4"
              grep -q '"UserName"' /tmp/sess_detail || { echo "FAIL: No UserName in session detail"; exit 1; }

              echo "=== Step 5: Delete session ==="
              HTTP5=$(curl -sk -u root:${PASS} -X DELETE https://${BMC}${SESS_PATH} -o /dev/null -w '%{http_code}')
              echo "Delete session HTTP=$HTTP5"
              test "$HTTP5" = "200" || { echo "FAIL: Delete session failed"; exit 1; }

              echo "=== Step 6: Verify token is invalid ==="
              HTTP6=$(curl -sk -H "X-Auth-Token: $TOKEN" https://${BMC}/redfish/v1/Systems/system -o /dev/null -w '%{http_code}')
              echo "Revoked token HTTP=$HTTP6"
              test "$HTTP6" = "401" || { echo "FAIL: Revoked token still works (HTTP=$HTTP6)"; exit 1; }

              echo "All session tests passed"
              rm -f /tmp/sess_headers /tmp/sess_detail
