name: "Inventory: Processors"
description: >-
  Verify CPU inventory via Redfish. Checks that SMBIOS processor data flows
  correctly through smbios-mdr to Redfish. Assumes cpu0 is present and
  Enabled. Requires host POST complete.

defaults:
  transport: &local
    proto: local

stages:
  - name: Wait for BMC and Power On Host
    steps:
      - cmd: ping
        name: Wait for SSH
        options:
          timeout: 5m
        parameters:
          host: "[[attributes.BMC]]"
      - cmd: cmd
        name: Wait for BMC services
        transport: *local
        options:
          timeout: 2m
        parameters:
          executable: sleep
          args: ["45"]
      - cmd: shell
        name: Power on host via Redfish
        transport: *local
        parameters:
          command: >-
            curl -sk -u root:[[attributes.BMCPassword]]
            -X POST -H 'Content-Type: application/json'
            -d '{"ResetType":"On"}'
            -o /dev/null -w '%{http_code}'
            https://[[attributes.BMC]]/redfish/v1/Systems/system/Actions/ComputerSystem.Reset
          expect:
            - regex: "^(200|204)$"
      - cmd: cmd
        name: Wait 220s for host POST and SMBIOS transfer
        transport: *local
        options:
          timeout: 5m
        parameters:
          executable: sleep
          args: ["220"]
      - cmd: cmd
        name: Verify host PowerState is On
        transport: *local
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Systems/system"]
          expect:
            - regex: '"PowerState": *"On"'

  - name: Processors Collection
    on-error: continue
    steps:
      - cmd: cmd
        name: Processors collection has >= 1 member
        transport: *local
        options:
          timeout: 30s
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Systems/system/Processors"]
          expect:
            - regex: '"Members@odata.count": *[1-9]'

  - name: cpu0 State
    on-error: continue
    steps:
      - cmd: cmd
        name: cpu0 State is Enabled
        transport: *local
        options:
          timeout: 30s
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Systems/system/Processors/cpu0"]
          expect:
            - regex: '"State": *"Enabled"'

  - name: cpu0 Attributes
    on-error: continue
    steps:
      - cmd: cmd
        name: cpu0 Manufacturer is populated
        transport: *local
        options:
          timeout: 30s
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Systems/system/Processors/cpu0"]
          expect:
            - regex: '"Manufacturer": *"[^"][^"]*"'

      - cmd: cmd
        name: cpu0 TotalCores >= 4
        transport: *local
        options:
          timeout: 30s
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Systems/system/Processors/cpu0"]
          expect:
            - regex: '"TotalCores": *[0-9]'

      - cmd: cmd
        name: cpu0 TotalThreads > 0
        transport: *local
        options:
          timeout: 30s
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Systems/system/Processors/cpu0"]
          expect:
            - regex: '"TotalThreads": *[1-9]'

      - cmd: cmd
        name: cpu0 MaxSpeedMHz > 0
        transport: *local
        options:
          timeout: 30s
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Systems/system/Processors/cpu0"]
          expect:
            - regex: '"MaxSpeedMHz": *[1-9]'

      - cmd: cmd
        name: cpu0 EffectiveFamily is populated
        transport: *local
        options:
          timeout: 30s
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Systems/system/Processors/cpu0"]
          expect:
            - regex: '"EffectiveFamily": *"[^"][^"]*"'

      - cmd: cmd
        name: cpu0 EffectiveModel is populated
        transport: *local
        options:
          timeout: 30s
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Systems/system/Processors/cpu0"]
          expect:
            - regex: '"EffectiveModel": *"[^"][^"]*"'

  - name: cpu0 SerialNumber
    on-error: continue
    steps:
      - cmd: shell
        name: cpu0 SerialNumber is not HPE fake data
        transport: *local
        options:
          timeout: 30s
        parameters:
          command: >-
            DATA=$(curl -sk -u root:[[attributes.BMCPassword]]
            https://[[attributes.BMC]]/redfish/v1/Systems/system/Processors/cpu0);
            SN=$(echo "$DATA" | grep -o '"SerialNumber": *"[^"]*"' | head -1);
            echo "$SN";
            echo "$SN" | grep -q '"Proc [0-9]"' && { echo "FAIL: fake HPE SerialNumber"; exit 1; };
            echo "SerialNumber OK"

  - name: System Processor Summary
    on-error: continue
    steps:
      - cmd: cmd
        name: ProcessorSummary CoreCount > 0
        transport: *local
        options:
          timeout: 30s
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Systems/system"]
          expect:
            - regex: '"CoreCount": *[0-9]{2,3}'
