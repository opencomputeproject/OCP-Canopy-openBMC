name: "Inventory: Power Supplies"
description: >-
  Verify PSU sensor presence, live power/voltage readings, sensor health, and
  PSU identity via Redfish. Covers gxp-psu kernel driver, entity-manager PSU
  config, and the PowerSubsystem Redfish path. PSU2 checks use on-error:
  continue as some platforms may have only 1 PSU.

defaults:
  transport: &local
    proto: local

stages:
  - name: Wait for BMC and Power On Host
    steps:
      - cmd: ping
        name: Wait for SSH
        options:
          timeout: 5m
        parameters:
          host: "[[attributes.BMC]]"
      - cmd: cmd
        name: Wait for services to settle
        transport: *local
        options:
          timeout: 2m
        parameters:
          executable: sleep
          args: ["45"]
      - cmd: cmd
        name: Power on host via Redfish
        transport: *local
        parameters:
          executable: sh
          args:
            - "-c"
            - "HTTP=$(curl -sk -u root:[[attributes.BMCPassword]] -X POST -H 'Content-Type: application/json' -d '{\"ResetType\":\"On\"}' https://[[attributes.BMC]]/redfish/v1/Systems/system/Actions/ComputerSystem.Reset -o /dev/null -w '%{http_code}'); echo \"Power On HTTP=$HTTP\"; test \"$HTTP\" = \"200\" || test \"$HTTP\" = \"204\""
      - cmd: cmd
        name: Wait 120s for host and PSU readings
        transport: *local
        options:
          timeout: 3m
        parameters:
          executable: sleep
          args: ["120"]

  - name: PSU1 Sensor Presence
    steps:
      - cmd: cmd
        name: All 8 PSU1 sensors present
        transport: *local
        options:
          timeout: 30s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "DATA=$(curl -sk -u root:[[attributes.BMCPassword]] https://[[attributes.BMC]]/redfish/v1/Chassis/chassis/Sensors); MISSING=''; for S in IINPUT_PSU1 IOUTPUT_PSU1 VINPUT_PSU1 VOUTPUT_PSU1 PINPUT_PSU1 POUTPUT_PSU1 TEMP1_PSU1 FAN1_PSU1; do echo \"$DATA\" | grep -q \"$S\" || MISSING=\"$MISSING $S\"; done; if [ -n \"$MISSING\" ]; then echo \"MISSING:$MISSING\"; exit 1; fi; echo 'All 8 PSU1 sensors present'"

  - name: PSU2 Power Readings
    steps:
      - cmd: cmd
        name: PINPUT_PSU2 > 0 W
        transport: *local
        options:
          timeout: 30s
          on-error: continue
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Chassis/chassis/Sensors/power_PINPUT_PSU2"]
          expect:
            - regex: '"Reading": *([1-9][0-9]*\.?[0-9]*|0\.[0-9]*[1-9][0-9]*)'
      - cmd: cmd
        name: POUTPUT_PSU2 > 0 W
        transport: *local
        options:
          timeout: 30s
          on-error: continue
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Chassis/chassis/Sensors/power_POUTPUT_PSU2"]
          expect:
            - regex: '"Reading": *([1-9][0-9]*\.?[0-9]*|0\.[0-9]*[1-9][0-9]*)'

  - name: PSU2 Voltage Readings
    steps:
      - cmd: cmd
        name: VINPUT_PSU2 in 100-250 V
        transport: *local
        options:
          timeout: 30s
          on-error: continue
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Chassis/chassis/Sensors/voltage_VINPUT_PSU2"]
          expect:
            - regex: '"Reading": *(1[0-9][0-9]|2[0-4][0-9]|250)\.?[0-9]*'
      - cmd: cmd
        name: VOUTPUT_PSU2 in 11-14 V
        transport: *local
        options:
          timeout: 30s
          on-error: continue
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Chassis/chassis/Sensors/voltage_VOUTPUT_PSU2"]
          expect:
            - regex: '"Reading": *(1[1-4])\.?[0-9]*'

  - name: PSU2 Sensor Health
    steps:
      - cmd: cmd
        name: PINPUT_PSU2 Health is OK
        transport: *local
        options:
          timeout: 30s
          on-error: continue
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Chassis/chassis/Sensors/power_PINPUT_PSU2"]
          expect:
            - regex: '"Health": *"OK"'

  - name: PSU1 Identity
    steps:
      - cmd: cmd
        name: PSU1 Manufacturer populated
        transport: *local
        options:
          timeout: 30s
          on-error: continue
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Chassis/chassis/PowerSubsystem/PowerSupplies/HPE_POWER_SUPPLY_1"]
          expect:
            - regex: '"Manufacturer": *"[^"][^"]*"'
      - cmd: cmd
        name: PSU1 SerialNumber populated
        transport: *local
        options:
          timeout: 30s
          on-error: continue
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Chassis/chassis/PowerSubsystem/PowerSupplies/HPE_POWER_SUPPLY_1"]
          expect:
            - regex: '"SerialNumber": *"[^"][^"]*"'
      - cmd: cmd
        name: PSU1 PartNumber populated
        transport: *local
        options:
          timeout: 30s
          on-error: continue
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Chassis/chassis/PowerSubsystem/PowerSupplies/HPE_POWER_SUPPLY_1"]
          expect:
            - regex: '"PartNumber": *"[^"][^"]*"'

  - name: PSU2 Identity
    steps:
      - cmd: cmd
        name: PSU2 Manufacturer populated
        transport: *local
        options:
          timeout: 30s
          on-error: continue
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Chassis/chassis/PowerSubsystem/PowerSupplies/HPE_POWER_SUPPLY_2"]
          expect:
            - regex: '"Manufacturer": *"[^"][^"]*"'
      - cmd: cmd
        name: PSU2 SerialNumber populated
        transport: *local
        options:
          timeout: 30s
          on-error: continue
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Chassis/chassis/PowerSubsystem/PowerSupplies/HPE_POWER_SUPPLY_2"]
          expect:
            - regex: '"SerialNumber": *"[^"][^"]*"'
      - cmd: cmd
        name: PSU2 PartNumber populated
        transport: *local
        options:
          timeout: 30s
          on-error: continue
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Chassis/chassis/PowerSubsystem/PowerSupplies/HPE_POWER_SUPPLY_2"]
          expect:
            - regex: '"PartNumber": *"[^"][^"]*"'

  - name: PSU2 Checks
    steps:
      - cmd: cmd
        name: PSU2 sensors readable
        transport: *local
        options:
          timeout: 30s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "for S in power_PINPUT_PSU2 power_POUTPUT_PSU2 voltage_VINPUT_PSU2 voltage_VOUTPUT_PSU2; do READING=$(curl -sk -u root:[[attributes.BMCPassword]] https://[[attributes.BMC]]/redfish/v1/Chassis/chassis/Sensors/$S | grep -o '\"Reading\": *[0-9.-]*' | head -1 | grep -o '[0-9.-]*$'); echo \"$S=$READING\"; test -n \"$READING\" || { echo \"FAIL: $S not found\"; exit 1; }; done"
      - cmd: cmd
        name: PINPUT_PSU2 Health is OK
        transport: *local
        options:
          timeout: 30s
          on-error: continue
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Chassis/chassis/Sensors/power_PINPUT_PSU2"]
          expect:
            - regex: '"Health": *"OK"'
