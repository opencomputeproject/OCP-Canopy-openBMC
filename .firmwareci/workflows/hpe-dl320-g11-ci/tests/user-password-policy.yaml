name: "User: Password Policy"
description: >-
  Verify password policy enforcement via pam_pwquality. Tests rejection
  of too-short passwords, single character class, username in password,
  and acceptance of a valid password. BMC-only, no host power required.

defaults:
  transport: &bmc_ssh
    proto: ssh
    options:
      host: "[[attributes.BMC]]"
      user: "root"
      password: "[[attributes.BMCPassword]]"

stages:
  - name: Wait for BMC
    steps:
      - cmd: ping
        name: Wait for SSH
        options:
          timeout: 5m
        parameters:
          host: "[[attributes.BMC]]"
      - cmd: cmd
        name: Wait for services to settle
        transport: *bmc_ssh
        options:
          timeout: 2m
        parameters:
          executable: sleep
          args: ["45"]

  - name: Weak Password Rejection
    steps:
      - cmd: cmd
        name: Reject password shorter than 8 chars (HTTP 400)
        transport: &local
          proto: local
        options:
          timeout: 30s
        parameters:
          executable: sh
          args:
            - "-c"
            - "HTTP=$(curl -sk -u root:[[attributes.BMCPassword]] -X POST -H 'Content-Type: application/json' -d '{\"UserName\":\"weakuser1\",\"Password\":\"Short1\",\"RoleId\":\"Administrator\",\"Enabled\":true}' https://[[attributes.BMC]]/redfish/v1/AccountService/Accounts -o /dev/null -w '%{http_code}'); echo \"Short password HTTP=$HTTP\"; test \"$HTTP\" = \"400\""
      - cmd: cmd
        name: Reject single character class password (HTTP 400)
        transport: *local
        options:
          timeout: 30s
        parameters:
          executable: sh
          args:
            - "-c"
            - "HTTP=$(curl -sk -u root:[[attributes.BMCPassword]] -X POST -H 'Content-Type: application/json' -d '{\"UserName\":\"weakuser2\",\"Password\":\"alllowercase\",\"RoleId\":\"Administrator\",\"Enabled\":true}' https://[[attributes.BMC]]/redfish/v1/AccountService/Accounts -o /dev/null -w '%{http_code}'); echo \"Single class HTTP=$HTTP\"; test \"$HTTP\" = \"400\""
      - cmd: cmd
        name: Reject password containing username (HTTP 400)
        transport: *local
        options:
          timeout: 30s
        parameters:
          executable: sh
          args:
            - "-c"
            - "HTTP=$(curl -sk -u root:[[attributes.BMCPassword]] -X POST -H 'Content-Type: application/json' -d '{\"UserName\":\"usercheck\",\"Password\":\"Usercheck99\",\"RoleId\":\"Administrator\",\"Enabled\":true}' https://[[attributes.BMC]]/redfish/v1/AccountService/Accounts -o /dev/null -w '%{http_code}'); echo \"Username in pass HTTP=$HTTP\"; test \"$HTTP\" = \"400\""

  - name: Valid Password Acceptance
    steps:
      - cmd: cmd
        name: Accept valid password (HTTP 201)
        transport: *local
        options:
          timeout: 30s
        parameters:
          executable: sh
          args:
            - "-c"
            - "HTTP=$(curl -sk -u root:[[attributes.BMCPassword]] -X POST -H 'Content-Type: application/json' -d '{\"UserName\":\"validuser\",\"Password\":\"V4lidPass9\",\"RoleId\":\"Administrator\",\"Enabled\":true}' https://[[attributes.BMC]]/redfish/v1/AccountService/Accounts -o /dev/null -w '%{http_code}'); echo \"Valid password HTTP=$HTTP\"; test \"$HTTP\" = \"201\""

  - name: Cleanup
    steps:
      - cmd: cmd
        name: Cleanup - delete validuser
        transport: *local
        options:
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "curl -sk -u root:[[attributes.BMCPassword]] -X DELETE https://[[attributes.BMC]]/redfish/v1/AccountService/Accounts/validuser -o /dev/null -w '%{http_code}'"
      - cmd: cmd
        name: Cleanup - delete weakuser1 if created
        transport: *local
        options:
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "curl -sk -u root:[[attributes.BMCPassword]] -X DELETE https://[[attributes.BMC]]/redfish/v1/AccountService/Accounts/weakuser1 -o /dev/null -w '%{http_code}'"
      - cmd: cmd
        name: Cleanup - delete weakuser2 if created
        transport: *local
        options:
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "curl -sk -u root:[[attributes.BMCPassword]] -X DELETE https://[[attributes.BMC]]/redfish/v1/AccountService/Accounts/weakuser2 -o /dev/null -w '%{http_code}'"
      - cmd: cmd
        name: Cleanup - delete usercheck if created
        transport: *local
        options:
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "curl -sk -u root:[[attributes.BMCPassword]] -X DELETE https://[[attributes.BMC]]/redfish/v1/AccountService/Accounts/usercheck -o /dev/null -w '%{http_code}'"
