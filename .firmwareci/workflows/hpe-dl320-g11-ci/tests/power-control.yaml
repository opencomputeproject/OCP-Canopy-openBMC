name: "Power: Host Control"
description: >-
  Verify the full host power control chain end-to-end: kernel power-ctrl
  driver, x86-power-control, D-Bus state, Redfish actions, and host POST
  output. Reads the obmc-console ring buffer log on the BMC at
  /var/log/obmc-console.log to verify the host produces POST messages.
  Run this test LAST as it power-cycles the host.

defaults:
  transport: &bmc_ssh
    proto: ssh
    options:
      host: "[[attributes.BMC]]"
      user: "root"
      password: "[[attributes.BMCPassword]]"

stages:
  - name: Wait for BMC
    steps:
      - cmd: ping
        name: Wait for SSH
        options:
          timeout: 5m
        parameters:
          host: "[[attributes.BMC]]"
      - cmd: cmd
        name: Wait for BMC services
        transport: &local
          proto: local
        options:
          timeout: 2m
        parameters:
          executable: sleep
          args: ["45"]

  - name: Power On Host
    steps:
      - cmd: shell
        name: Send Power On via Redfish
        transport: *local
        parameters:
          command: >-
            curl -sk -u root:[[attributes.BMCPassword]]
            -X POST -H 'Content-Type: application/json'
            -d '{"ResetType":"On"}'
            -o /dev/null -w '%{http_code}'
            https://[[attributes.BMC]]/redfish/v1/Systems/system/Actions/ComputerSystem.Reset
          expect:
            - regex: "^(200|204)$"

      - cmd: cmd
        name: Wait 120s for host to boot
        transport: *local
        options:
          timeout: 3m
        parameters:
          executable: sleep
          args: ["120"]

  - name: Verify Host Is On
    steps:
      - cmd: shell
        name: Console contains Initialization output
        transport: *bmc_ssh
        options:
          timeout: 5s
          on-error: continue
        parameters:
          command: "grep -qi 'Initialization' /var/log/obmc-console.log"

      - cmd: shell
        name: Console contains BIOS output
        transport: *bmc_ssh
        options:
          timeout: 5s
          on-error: continue
        parameters:
          command: "grep -qi 'BIOS' /var/log/obmc-console.log"

      - cmd: shell
        name: Console contains Memory output
        transport: *bmc_ssh
        options:
          timeout: 5s
          on-error: continue
        parameters:
          command: "grep -qi 'Memory' /var/log/obmc-console.log"

      - cmd: cmd
        name: PowerState is On via Redfish
        transport: *local
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Systems/system"]
          expect:
            - regex: '"PowerState": *"On"'

      - cmd: cmd
        name: Host state Running via D-Bus
        transport: *bmc_ssh
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: busctl
          args: [get-property, xyz.openbmc_project.State.Host, /xyz/openbmc_project/state/host0, xyz.openbmc_project.State.Host, CurrentHostState]
          expect:
            - regex: "Running"

      - cmd: cmd
        name: Chassis state On via D-Bus
        transport: *bmc_ssh
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: busctl
          args: [get-property, xyz.openbmc_project.State.Chassis, /xyz/openbmc_project/state/chassis0, xyz.openbmc_project.State.Chassis, CurrentPowerState]
          expect:
            - regex: "On"

      - cmd: cmd
        name: Power control service active
        transport: *bmc_ssh
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: systemctl
          args: ["is-active", "xyz.openbmc_project.Chassis.Control.Power@0.service"]

  - name: Power Off Host via Redfish
    steps:
      - cmd: shell
        name: Send ForceOff
        transport: *local
        parameters:
          command: >-
            curl -sk -u root:[[attributes.BMCPassword]]
            -X POST -H 'Content-Type: application/json'
            -d '{"ResetType":"ForceOff"}'
            -o /dev/null -w '%{http_code}'
            https://[[attributes.BMC]]/redfish/v1/Systems/system/Actions/ComputerSystem.Reset
          expect:
            - regex: "^(200|204)$"

      - cmd: cmd
        name: Wait for power off
        transport: *local
        parameters:
          executable: sleep
          args: ["15"]

      - cmd: cmd
        name: PowerState is Off via Redfish
        transport: *local
        options:
          timeout: 30s
          on-error: continue
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Systems/system"]
          expect:
            - regex: '"PowerState": *"Off"'

      - cmd: cmd
        name: Host state Off via D-Bus
        transport: *bmc_ssh
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: busctl
          args: [get-property, xyz.openbmc_project.State.Host, /xyz/openbmc_project/state/host0, xyz.openbmc_project.State.Host, CurrentHostState]
          expect:
            - regex: "Off"

  - name: Power On Host via Redfish
    steps:
      - cmd: shell
        name: Send Power On
        transport: *local
        parameters:
          command: >-
            curl -sk -u root:[[attributes.BMCPassword]]
            -X POST -H 'Content-Type: application/json'
            -d '{"ResetType":"On"}'
            -o /dev/null -w '%{http_code}'
            https://[[attributes.BMC]]/redfish/v1/Systems/system/Actions/ComputerSystem.Reset
          expect:
            - regex: "^(200|204)$"

      - cmd: cmd
        name: Wait 120s for host to boot
        transport: *local
        options:
          timeout: 3m
        parameters:
          executable: sleep
          args: ["120"]

  - name: Verify Second Boot
    steps:
      - cmd: cmd
        name: PowerState is On via Redfish
        transport: *local
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Systems/system"]
          expect:
            - regex: '"PowerState": *"On"'

      - cmd: shell
        name: Console contains Initialization output
        transport: *bmc_ssh
        options:
          timeout: 5s
          on-error: continue
        parameters:
          command: "grep -qi 'Initialization' /var/log/obmc-console.log"

      - cmd: shell
        name: Console contains BIOS output
        transport: *bmc_ssh
        options:
          timeout: 5s
          on-error: continue
        parameters:
          command: "grep -qi 'BIOS' /var/log/obmc-console.log"

      - cmd: shell
        name: Console contains Memory output
        transport: *bmc_ssh
        options:
          timeout: 5s
          on-error: continue
        parameters:
          command: "grep -qi 'Memory' /var/log/obmc-console.log"

      - cmd: shell
        name: Console contains CHIF output
        transport: *bmc_ssh
        options:
          timeout: 5s
          on-error: continue
        parameters:
          command: "grep -qi 'CHIF' /var/log/obmc-console.log"

      - cmd: cmd
        name: Host state Running via D-Bus
        transport: *bmc_ssh
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: busctl
          args: [get-property, xyz.openbmc_project.State.Host, /xyz/openbmc_project/state/host0, xyz.openbmc_project.State.Host, CurrentHostState]
          expect:
            - regex: "Running"
