---
name: 'Build OpenBMC'
description: 'Build OpenBMC for a given board'
inputs:
  board:
    description: 'The target machine name (e.g., hpe-proliant-g11)'
    required: true
  signing-key:
    description: 'PEM-encoded private signing key for GXP U-Boot signature'
    required: false
runs:
  using: 'composite'
  steps:
    - name: Configure bitbake shared folders
      shell: bash
      run: |
        mkdir -p /home/runner/data/bitbake.downloads
        mkdir -p /home/runner/data/bitbake.sstate

    - name: Init git submodules
      shell: bash
      run: git submodule update --init --recursive --checkout

    - name: Write signing key
      if: inputs.signing-key != ''
      shell: bash
      run: |
        echo "${{ inputs.signing-key }}" > "${{ runner.temp }}/signing_key.pem"
        chmod 600 "${{ runner.temp }}/signing_key.pem"

    - name: Build OpenBMC
      shell: bash
      env:
        BB_ENV_PASSTHROUGH_ADDITIONS: "DL_DIR SSTATE_DIR"
        DL_DIR: "/home/runner/data/bitbake.downloads"
        SSTATE_DIR: "/home/runner/data/bitbake.sstate"
        SIGNING_KEY_PATH: ${{ inputs.signing-key != '' && format('{0}/signing_key.pem', runner.temp) || '' }}
      run: |
        . setup ${{ inputs.board }}
        if [ -n "$SIGNING_KEY_PATH" ]; then
          echo "HPE_SIGNING_KEY = \"$SIGNING_KEY_PATH\"" >> conf/local.conf
        fi
        bitbake obmc-phosphor-image

    - name: Upload firmware image
      uses: actions/upload-artifact@v4
      with:
        name: obmc-phosphor-image-${{ inputs.board }}.static.mtd
        path: build/${{ inputs.board }}/tmp/deploy/images/${{ inputs.board }}/obmc-phosphor-image-${{ inputs.board }}.static.mtd

    - name: Upload firmware image tar
      uses: actions/upload-artifact@v4
      with:
        name: obmc-phosphor-image-${{ inputs.board }}.static.mtd.tar
        path: build/${{ inputs.board }}/tmp/deploy/images/${{ inputs.board }}/obmc-phosphor-image-${{ inputs.board }}.static.mtd.tar

    - name: Upload provisioning images
      uses: actions/upload-artifact@v4
      with:
        name: provisioning-images-${{ inputs.board }}
        path: build/${{ inputs.board }}/tmp/deploy/images/${{ inputs.board }}/obmc-phosphor-image-hpe-proliant-*.static.mtd
