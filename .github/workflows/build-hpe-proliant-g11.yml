---
name: hpe-proliant-g11 Build

on:
  push:
    branches:
      - hpe/main
    paths:
      - 'openbmc/**'
      - 'meta-canopy/**'
      - '.github/**'
      - '.firmwareci/**'
  pull_request:
    branches:
      - hpe/main
    paths:
      - 'openbmc/**'
      - 'meta-canopy/**'
      - '.github/**'
      - '.firmwareci/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, Hydra, Large]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        uses: ./.github/actions/build
        with:
          board: hpe-proliant-g11

  firmwareci:
    runs-on: [self-hosted, Hydra, Large]
    needs: build
    steps:
      - name: Download provisioning image
        uses: actions/download-artifact@v4
        with:
          name: provisioning-images-hpe-proliant-g11

      - name: Upload to FirmwareCI
        uses: docker://firmwareci/action:v5.1
        with:
          TOKEN: ${{ secrets.FWCI_TOKEN }}
          WORKFLOW_ID: ${{ secrets.FWCI_WORKFLOW_ID }}
          COMMIT_HASH: ${{ github.sha }}
          BINARIES: Binary=obmc-phosphor-image-hpe-proliant-dl320-g11.static.mtd
